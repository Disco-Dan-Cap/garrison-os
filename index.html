<!--
  GARRISON OS — desktop portfolio v0.2 "skinned"
  Changes from v0.1:
    - Photographic Bliss background (assets/bliss-desktop.jpg / bliss-mobile.jpg,
      Higgsfield-generated) with CSS gradient fallback.
    - Pixel-art SVG folders: one color per project + symbol hinting at content.
    - Pixel-art UFO with visible green alien in the dome (refs: "best ship style"
      + "ufo with alien visible"). Bob animation + blinking lights kept.
    - Pixel-art speech bubble (chunky black border, stepped corners, offset shadow).
    - "Press Start 2P" pixel font for labels/accents.
    - Mobile layout + touch (pointer-event) window dragging.
  Still placeholder: fisheye portrait (needs Garrison photo), case-study imagery.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --mac-face:#d9d9d9; --mac-line:#888; --mac-dark:#555;
    --mac-title1:#e8e8e8; --mac-title2:#bcbcbc;
    --ink:#141418; --accent:#2b5fb3; --px-black:#16161c;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Geneva","Tahoma",system-ui,sans-serif;
    overflow:hidden; color:var(--ink);
    user-select:none; -webkit-user-select:none;
  }
  .pxfont{font-family:"Press Start 2P","Geneva",monospace;}

  /* ---------- DESKTOP / BACKGROUND ---------- */
  #desktop{
    position:fixed; inset:0; overflow:hidden;
    /* gradient fallback if the photo hasn't loaded / is missing */
    background:
      radial-gradient(130% 70% at 50% 118%, #67b13c 0%, #57a233 40%, #3c7d20 58%, transparent 59%),
      linear-gradient(#2e6fd0 0%, #4f8fe0 40%, #9cc5f0 75%, #d2e8fc 100%);
  }
  #desktop .bg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:center bottom; display:block;
    pointer-events:none; -webkit-user-drag:none; user-select:none;
  }

  /* CRT overlay: scanlines + vignette */
  #crt{position:fixed;inset:0;pointer-events:none;z-index:90;
    background:
      repeating-linear-gradient(rgba(0,0,0,.07) 0 1px, transparent 1px 3px),
      radial-gradient(120% 120% at 50% 50%, transparent 62%, rgba(0,0,0,.30) 100%);
    mix-blend-mode:multiply;}

  /* ---------- TOP MENU BAR (Mac Platinum) ---------- */
  #menubar{
    position:fixed;top:0;left:0;right:0;height:26px;z-index:80;
    background:linear-gradient(var(--mac-title1),var(--mac-title2));
    border-bottom:2px solid var(--px-black);
    display:flex;align-items:center;gap:16px;padding:0 12px;
    font-size:12px;
  }
  #menubar .logo{font-family:"Press Start 2P",monospace;font-size:10px;letter-spacing:0;}
  #menubar .mi{opacity:.85;}
  #menubar .clock{margin-left:auto;font-variant-numeric:tabular-nums;}

  /* ---------- FOLDERS ---------- */
  #icons{position:absolute;top:52px;left:22px;display:grid;z-index:20;
    grid-template-columns:repeat(4,124px);gap:20px 12px;width:532px;}
  /* newest projects — center stage */
  #icons-center{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);z-index:20;
    display:flex;gap:34px;}
  /* right-side vertical stack */
  #icons-right{position:absolute;top:50%;right:30px;transform:translateY(-50%);z-index:20;
    display:flex;flex-direction:column;align-items:center;gap:16px;}
  .folder{width:124px;text-align:center;cursor:pointer;color:#fff;}
  .folder svg{width:94px;height:auto;display:block;margin:0 auto 5px;
    filter:drop-shadow(0 3px 0 rgba(0,0,0,.25));}
  .folder .lbl{font-family:"Press Start 2P",monospace;font-size:8px;line-height:1.5;
    padding:2px 3px;border-radius:2px;
    text-shadow:1px 1px 0 var(--px-black),-1px 1px 0 var(--px-black),1px -1px 0 var(--px-black),-1px -1px 0 var(--px-black);}
  .folder:hover .lbl{background:var(--accent);text-shadow:none;}
  .folder:hover svg{transform:translateY(-2px);}
  .folder:active svg{filter:drop-shadow(0 1px 0 rgba(0,0,0,.25)) brightness(.92);transform:translateY(1px);}

  /* ---------- WINDOWS (Mac Platinum chrome) ---------- */
  .win{position:absolute;background:var(--mac-face);border:2px solid var(--px-black);
    border-radius:6px 6px 3px 3px;box-shadow:4px 6px 0 rgba(0,0,0,.30);
    display:none;flex-direction:column;z-index:40;min-width:260px;}
  .win.open{display:flex;}
  .titlebar{height:24px;display:flex;align-items:center;gap:8px;padding:0 8px;
    border-bottom:2px solid var(--px-black);border-radius:4px 4px 0 0;cursor:grab;touch-action:none;
    background:repeating-linear-gradient(180deg,#f2f2f2 0 1px,#c8c8c8 1px 2px);}
  .titlebar.drag{cursor:grabbing;}
  .closebox{width:15px;height:15px;border:2px solid var(--px-black);background:#cfcfcf;cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;}
  .closebox::after{content:"\2715";font-size:9px;font-weight:bold;line-height:1;color:var(--px-black);}
  .closebox:hover{background:#9fb6e0;}
  .title{font-family:"Press Start 2P",monospace;font-size:8px;flex:1;text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .winbody{padding:14px;overflow:auto;background:#fff;border-radius:0 0 2px 2px;}

  /* preview window */
  .preview{width:300px;}
  .preview .cover{height:130px;border:2px solid var(--px-black);overflow:hidden;
    background:linear-gradient(135deg,#cfe0f5,#e9d8b6);
    display:flex;align-items:center;justify-content:center;color:#5a5a5a;font-size:12px;}
  .preview .cover img{width:100%;height:100%;object-fit:cover;display:block;image-rendering:auto;}
  .preview .one{font-size:13px;margin:10px 0 12px;line-height:1.45;}
  /* large preview (copia flagship) — ~2x, wide 3-up cover shown uncropped on cream */
  .preview.large{width:min(600px,92vw);}
  .preview.large .cover{height:200px;background:#FAF6EE;}
  .preview.large .cover img{object-fit:contain;}
  .preview.large .one{font-size:16px;margin:14px 0 10px;line-height:1.5;}
  .preview .link{display:inline-block;font-size:14px;margin:0 0 12px;font-weight:bold;
    color:#1C664D;text-decoration:none;word-break:break-word;}
  .preview .link:hover{color:#1E3D30;text-decoration:underline;}
  .preview .note{font-size:12px;color:#777;line-height:1.55;margin:0 0 14px;}
  .btn{font-family:"Press Start 2P",monospace;font-size:8px;padding:7px 12px;cursor:pointer;
    background:linear-gradient(#fff,#dcdcdc);border:2px solid var(--px-black);
    box-shadow:2px 2px 0 var(--px-black);}
  .btn:active{box-shadow:0 0 0 var(--px-black);transform:translate(2px,2px);}

  /* case study window */
  .case{width:min(640px,86vw);max-height:78vh;}
  .case .winbody h2{margin:.1em 0 .15em;font-family:"Press Start 2P",monospace;font-size:15px;}
  .case .winbody .meta{color:#666;font-size:12px;margin-bottom:12px;}
  .case .hero{height:170px;margin:0 0 14px;border:2px solid var(--px-black);
    background:linear-gradient(135deg,#cfe0f5,#e9d8b6);
    display:flex;align-items:center;justify-content:center;color:#5a5a5a;font-size:12px;}
  .case .winbody h3{font-family:"Press Start 2P",monospace;font-size:9px;
    color:var(--accent);margin:18px 0 5px;}
  .case .winbody p{font-size:14px;line-height:1.55;margin:0 0 6px;}

  /* ---------- EMBEDDED CASE (finished page, near full-screen) ---------- */
  /* Title bar + a full-bleed iframe; the case study scrolls inside the iframe. */
  .case.embed{width:min(1800px,98vw);height:94vh;max-height:94vh;max-width:1800px;
    overflow:hidden;}
  .case.embed .embedframe{flex:1;min-height:0;width:100%;border:0;display:block;
    background:#fff;border-radius:0 0 2px 2px;}

  /* ---------- BOTTOM-LEFT: GARRISON (fisheye) STANDING ON THE PLANET CURVE ---------- */
  /* z-index sits in the background layer with the UFO: above wallpaper, below the
     desktop icons (z20) and every window (z40+), so windows always cover it. */
  #garrison-wrap{position:fixed;left:4vw;bottom:9.5vh;z-index:5;height:38vh;width:auto;
    transform:rotate(-20deg);transform-origin:50% 96%;cursor:pointer;line-height:0;
    filter:drop-shadow(0 6px 8px rgba(10,30,5,.35));transition:filter .2s ease;}
  #garrison-wrap:hover{filter:drop-shadow(0 6px 8px rgba(10,30,5,.35)) drop-shadow(0 0 11px rgba(120,232,150,.5));}
  #garrison{position:static;display:block;height:100%;width:auto;
    pointer-events:none;user-select:none;-webkit-user-drag:none;}
  /* periodic glare, masked to the figure's silhouette (webp alpha) — sweeps every 4s */
  #garrison-glare{position:absolute;inset:0;pointer-events:none;overflow:hidden;mix-blend-mode:screen;
    -webkit-mask:url(assets/garrison-standing.webp) center/100% 100% no-repeat;
            mask:url(assets/garrison-standing.webp) center/100% 100% no-repeat;}
  #garrison-glare::before{content:"";position:absolute;top:-30%;height:160%;width:40%;left:-55%;
    background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.92),rgba(255,255,255,0));
    transform:skewX(-16deg);filter:blur(3px);animation:garrisonGlare 4s ease-in-out infinite;}
  @keyframes garrisonGlare{0%{left:-55%;opacity:0;}6%{opacity:1;}20%{left:112%;opacity:1;}24%{left:112%;opacity:0;}100%{left:112%;opacity:0;}}
  @media(prefers-reduced-motion:reduce){#garrison-glare::before{animation:none;}}
  /* About panel (opens when the figure is clicked) */
  .win.about{width:min(430px,92vw);max-height:82vh;}
  .win.about .winbody h2{margin:.1em 0 .18em;font-family:"Press Start 2P",monospace;font-size:23px;line-height:1.25;}
  .win.about .winbody .meta{color:#5c6b60;font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-family:"JetBrains Mono",monospace;margin-bottom:6px;}
  .win.about .winbody h3{font-family:"Press Start 2P",monospace;font-size:8px;color:var(--accent);margin:16px 0 6px;}
  .win.about .winbody p{font-size:13px;line-height:1.5;margin:0 0 8px;}
  .win.about .winbody .edu b{color:#1a1517;}
  .win.about .winbody .sk b{display:inline-block;font-family:"Press Start 2P",monospace;font-size:8px;color:var(--accent);text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px;}
  .win.about .winbody .sk{margin-top:16px;font-size:12px;color:#3a3a3a;}
  .win.about .winbody .dim{color:#8a978c;}
  /* armed = everything hidden from first paint; the typewriter script reveals each row */
  .win.about .winbody.arm>*{opacity:0;}
  .win.about .type-cursor{display:inline-block;margin-left:1px;color:var(--accent);font-weight:400;animation:typeBlink .6s steps(1) infinite;}
  @keyframes typeBlink{0%,50%{opacity:1;}50.01%,100%{opacity:0;}}
  .win.about .logoloop{overflow:hidden;position:relative;margin-top:16px;padding:11px 0 3px;border-top:1px solid #e6e6e6;
    -webkit-mask:linear-gradient(90deg,transparent,#000 14%,#000 86%,transparent);mask:linear-gradient(90deg,transparent,#000 14%,#000 86%,transparent);}
  .win.about .logoloop__track{display:flex;width:max-content;animation:logoloopScroll 26s linear infinite;}
  .win.about .logoloop:hover .logoloop__track{animation-play-state:paused;}
  .win.about .logoloop__list{display:flex;align-items:center;gap:26px;padding:0 26px 0 0;margin:0;list-style:none;}
  .win.about .logoloop__item{display:flex;align-items:center;}
  .win.about .logoloop img{height:23px;width:auto;display:block;}
  .win.about .ll-mono{display:inline-flex;align-items:center;justify-content:center;height:23px;min-width:23px;padding:0 6px;border:1px solid #d3d3d3;border-radius:5px;font:600 10px/1 "JetBrains Mono",monospace;color:#6a6a6a;letter-spacing:.04em;}
  @keyframes logoloopScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @media(prefers-reduced-motion:reduce){.win.about .logoloop__track{animation:none;}}
  /* ===== name becomes a button after it types ===== */
  .win.about .winbody h2.name-btn{cursor:pointer;border:2px solid var(--px-black);border-radius:8px;padding:5px 10px;box-shadow:3px 3px 0 rgba(0,0,0,.2);transition:background .14s,box-shadow .09s,transform .06s;}
  .win.about .winbody h2.name-btn:hover{background:#eaf0ff;}
  .win.about .winbody h2.name-btn:active{box-shadow:1px 1px 0 rgba(0,0,0,.2);transform:translate(2px,2px);}
  /* ===== lanyard overlay ===== */
  #lanyard-overlay{position:fixed;inset:0;z-index:9998;display:none;}
  #lanyard-overlay.open{display:block;}
  #lanyard-backdrop{position:absolute;inset:0;background:rgba(6,10,8,.42);opacity:0;transition:opacity .35s ease;}
  #lanyard-overlay.open #lanyard-backdrop{opacity:1;}
  #lanyard-stage{position:absolute;inset:0;perspective:1300px;overflow:hidden;}
  #lanyard-arm{position:absolute;left:50%;top:-170px;transform-origin:top center;will-change:transform;}
  #lanyard-strap{width:48px;height:320px;margin:0 auto;
    background:#edecef url(assets/lanyard/globe-strap.png) center top/48px repeat-y;
    box-shadow:inset 1px 0 0 rgba(0,0,0,.16),inset -1px 0 0 rgba(0,0,0,.16),0 2px 7px rgba(0,0,0,.28);}
  #lanyard-clip{width:46px;height:30px;margin:-6px auto 0;position:relative;z-index:3;border-radius:6px;
    background:linear-gradient(#f1f3f7,#9098a4);box-shadow:0 3px 6px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -1px 0 rgba(0,0,0,.22);}
  #lanyard-card{width:238px;margin:-22px auto 0;position:relative;z-index:1;transform-origin:top center;cursor:grab;filter:drop-shadow(0 22px 30px rgba(0,0,0,.5));}
  #lanyard-card.grab{cursor:grabbing;}
  #lanyard-card img{width:100%;display:block;pointer-events:none;-webkit-user-drag:none;}
  #lanyard-close{position:absolute;top:18px;right:22px;z-index:3;width:42px;height:42px;border-radius:50%;border:2px solid var(--px-black);background:#fff;font-size:17px;line-height:1;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.3);}
  #lanyard-close:hover{background:#eee;}
  #lanyard-hint{position:absolute;left:0;right:0;bottom:30px;text-align:center;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7);pointer-events:none;}
  #garrison-shadow{position:fixed;left:calc(4vw + 4vh);bottom:8.6vh;z-index:4;
    width:18vh;height:3.4vh;border-radius:50%;pointer-events:none;
    background:radial-gradient(closest-side, rgba(10,30,5,.42), rgba(10,30,5,0) 70%);}

  /* ---------- UFO (pixel art) ---------- */
  /* z-index sits in the background layer: above wallpaper, below the desktop
     icons (z20) and every window (z40+), so windows always cover it. */
  #ufo{position:fixed;top:84px;right:13%;z-index:5;cursor:pointer;
    animation:bob 3.4s ease-in-out infinite;}
  #ufo svg{width:108px;height:auto;display:block;
    filter:drop-shadow(0 6px 0 rgba(0,0,0,.18));}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-14px) rotate(1deg);}}
  #ufo .lite{animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:.25;}50%{opacity:1;}}

  /* ---------- PIXEL SPEECH BUBBLE ---------- */
  #bubble{position:fixed;z-index:75;display:none;max-width:230px;
    font-family:"Press Start 2P",monospace;font-size:9px;line-height:1.7;color:var(--ink);
    background:#fff;padding:12px 14px;
    border:3px solid var(--px-black);
    box-shadow:6px 6px 0 rgba(22,22,28,.45);
    clip-path:polygon(0 9px,3px 9px,3px 6px,6px 6px,6px 3px,9px 3px,9px 0,
      calc(100% - 9px) 0,calc(100% - 9px) 3px,calc(100% - 6px) 3px,calc(100% - 6px) 6px,
      calc(100% - 3px) 6px,calc(100% - 3px) 9px,100% 9px,
      100% calc(100% - 9px),calc(100% - 3px) calc(100% - 9px),calc(100% - 3px) calc(100% - 6px),
      calc(100% - 6px) calc(100% - 6px),calc(100% - 6px) calc(100% - 3px),calc(100% - 9px) calc(100% - 3px),
      calc(100% - 9px) 100%,9px 100%,9px calc(100% - 3px),6px calc(100% - 3px),
      6px calc(100% - 6px),3px calc(100% - 6px),3px calc(100% - 9px),0 calc(100% - 9px));}
  #tail{position:fixed;z-index:74;display:none;width:24px;height:18px;}
  #tail i{position:absolute;background:#fff;border-left:3px solid var(--px-black);border-right:3px solid var(--px-black);}
  #tail i:nth-child(1){left:0;top:0;width:18px;height:9px;}
  #tail i:nth-child(2){left:6px;top:9px;width:12px;height:6px;border-bottom:3px solid var(--px-black);}

  .hint{position:fixed;bottom:6px;right:10px;z-index:80;font-size:10px;color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.6);opacity:.8;}

  /* ---------- MOBILE ---------- */
  @media (max-width:640px){
    /* single fixed page: one grid fills the screen, no scrolling */
    #desktop{ overflow:hidden; }
    #icons{ position:absolute; top:30px; left:0; right:0; bottom:12vh; margin:0; padding:2px 9px 0; width:auto;
      display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(5,1fr); gap:0 4px;
      align-items:center; justify-items:center; }
    #icons-center, #icons-right{ display:none; }
    .folder{ width:auto; max-width:100%; margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .folder svg{ width:60px; }
    .folder .lbl{ font-size:7px; line-height:1.4; }
    /* UFO becomes its own grid cell (static, no bob drift) */
    #ufo{ position:static; left:auto; right:auto; top:auto; bottom:auto; margin:0; animation:none;
      display:flex; align-items:center; justify-content:center; }
    #ufo svg{ width:56px; margin:0; }
    #menubar{ gap:10px; height:24px; }
    #menubar .mi{ display:none; }
    #garrison-wrap{ left:0; bottom:0; height:13vh; pointer-events:none; }
    #garrison-shadow{ display:none; }
    .preview{ width:min(300px,88vw); }
    .case{ width:94vw; max-height:80vh; }
    .case .hero{ height:120px; }
    .case.embed{ width:98vw; height:94vh; max-height:94vh; }
    .hint{ display:none; }
  }
</style>

<style id="wmp-css">
  /* ===== Windows Media Player (retro WMP9 homage) ===== */
  #wmp-icon{position:fixed; left:calc(18.5vw - 48px); bottom:calc(49vh - 48px); z-index:6; width:96px; text-align:center;
    cursor:pointer; animation:bob 3.4s ease-in-out infinite; user-select:none; -webkit-user-select:none;}
  #wmp-icon img{width:72px; height:auto; display:block; margin:0 auto 5px; filter:drop-shadow(0 3px 0 rgba(0,0,0,.28));}
  #wmp-icon .lbl{font-family:"Press Start 2P",monospace; font-size:8px; line-height:1.6; color:#fff; padding:2px 3px; border-radius:2px;
    text-shadow:1px 1px 0 var(--px-black),-1px 1px 0 var(--px-black),1px -1px 0 var(--px-black),-1px -1px 0 var(--px-black);}
  #wmp-icon:hover .lbl{background:var(--accent); text-shadow:none;}
  #wmp-icon:hover img{transform:translateY(-2px);}
  #wmp-icon:active img{filter:drop-shadow(0 1px 0 rgba(0,0,0,.28)) brightness(.93); transform:translateY(1px);}
  @media(max-width:640px){ #wmp-icon{ position:static; left:auto; right:auto; top:auto; bottom:auto; margin:0; width:auto; animation:none; display:flex; flex-direction:column; align-items:center; justify-content:center; } #wmp-icon img{ width:54px; } #wmp-icon .lbl{ font-size:7px; line-height:1.4; } }

  #wmpwin{position:fixed; display:none; width:430px; max-width:94vw; left:50%; top:64px; margin-left:-215px; z-index:60;
    background:#ece9d8; border:1px solid #0a246a; border-radius:8px 8px 3px 3px; box-shadow:0 18px 50px rgba(0,0,0,.5);
    font-family:Tahoma,"Geneva",system-ui,sans-serif; overflow:hidden;}

/* ================= PIXEL ART HELPERS ================= */
/* Render a grid of single-character "pixels" into SVG rects. */
function pixelSVG(rows,palette,opts={}){
  const cell=opts.cell||1;
  const w=rows[0].length*cell, h=rows.length*cell;
  let liteIdx=0, out='';
  rows.forEach((row,y)=>{
    for(let x=0;x<row.length;x++){
      const ch=row[x];
      if(ch==='.'||!palette[ch]) continue;
      const cls=(ch==='Y')?` class="lite" style="animation-delay:${(liteIdx++%5)*0.28}s"`:'';
      out+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="${palette[ch]}"${cls}/>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${out}</svg>`;
}

/* 8x8 white symbols drawn on the folder front */

  bolt:["....XX..","...XX...","..XXXX..","....XX..","...XX...","..XX....",".XX.....","XX......"],

  leaf:["......KK..","....KKvGK.","...KGvGGK.","..KGvGGGK.",".KGvGGGK..",".KvGGGGK..",".KvGGGK...",".KKGGK....","K.KKK....."],
  house:["...XX...","..XXXX..",".XXXXXX.","XXXXXXXX",".XXXXXX.",".XX..XX.",".XX..XX.",".XXXXXX."],

/* Pixel folder — classic open-folder shape per reference.
   FOLDER_FILL defines only the colored shape (D = dark back flap + tab, F = front panel).
   The 1px black outline is generated automatically around every exposed edge
   (4-neighborhood), which wraps the whole silhouette and yields stepped corners,
   plus a black dividing line wherever the back flap meets the front panel. */
const FOLDER_FILL=[
"..............DDDDDDD.",
".............DDDDDDDD.",
"............DDDDDDDDD.",
".DDDDDDDDDDDDDDDDDDDD.",
".DDDDDDDDDDDDDDDDDDDD.",
".FFFFFFFDDDDDDDDDDDDD.",
".FFFFFFFFDDDDDDDDDDDD.",
".FFFFFFFFFDDDDDDDDDDD.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF."
];
function folderSVG(fill,dark,symbol){
  const rows=FOLDER_FILL, H=rows.length, W=rows[0].length;
  const get=(x,y)=>(y<0||y>=H||x<0||x>=W)?'.':rows[y][x];
  const isFill=c=>c==='D'||c==='F';
  let s=`<svg viewBox="0 0 ${W+2} ${H+2}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">`;
  for(let y=-1;y<=H;y++)for(let x=-1;x<=W;x++){
    const c=get(x,y); let col=null;
    if(c==='.'){
      if(isFill(get(x+1,y))||isFill(get(x-1,y))||isFill(get(x,y+1))||isFill(get(x,y-1))) col='#16161c';
    }else if(c==='D'){
      col=(get(x+1,y)==='F'||get(x-1,y)==='F'||get(x,y+1)==='F'||get(x,y-1)==='F')?'#16161c':dark;
    }else col=fill;
    if(col) s+=`<rect x="${x+1}" y="${y+1}" width="1" height="1" fill="${col}"/>`;
  }
  const px=SYMBOLS[symbol]||[];
  /* symbol pixels: X/W white, plus accent colors for multicolor glyphs */
  const SYMC={X:'#fff',W:'#fff',C:'#aee2ff',L:'#c9a6f0',Y:'#ffd34d',K:'#16161c',G:'#56c172',v:'#16161c',R:'#bd4a3c'};
  /* center the symbol's inked bounding box on the front panel (rendered cols 2-21, rows 9-19) */
  let x0=99,x1=-1,y0=99,y1=-1;
  px.forEach((row,y)=>{for(let x=0;x<row.length;x++){if(SYMC[row[x]]){
    if(x<x0)x0=x; if(x>x1)x1=x; if(y<y0)y0=y; if(y>y1)y1=y;}}});
  const gwu=x1-x0+1, ghu=y1-y0+1;
  const cell=Math.min(1.2, 9.2/ghu, 18/gwu);
  const ox=12-(gwu*cell)/2-x0*cell;
  const oy=14.4-(ghu*cell)/2-y0*cell;
  px.forEach((row,y)=>{for(let x=0;x<row.length;x++){if(SYMC[row[x]])
    s+=`<rect x="${(ox+x*cell).toFixed(2)}" y="${(oy+y*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}" fill="${SYMC[row[x]]}"/>`;}});
  return s+'</svg>';
}

/* ============ IDLE PRE-WARM — make project previews + pages feel instant ============
   Runs ONLY after the desktop is up, during browser idle time, so it never slows the
   initial paint. Quietly caches: (1) every preview cover (~1MB total) so clicking a
   folder pops its preview instantly, and (2) each case-study page shell so opening a
   project is ready. Backs off on slow / data-saver connections. */
(function(){
  const conn = navigator.connection || navigator.webkitConnection || {};
  if(conn.saveData) return;                            // respect Data Saver
  if(conn.effectiveType && /2g/.test(conn.effectiveType)) return; // skip slow links
  const fast = !conn.effectiveType || /4g/.test(conn.effectiveType);   // only heavy-warm on good links
  /* Pull a case study's in-page images/videos (and one level of nested same-origin
     iframes, e.g. Disco's design-system) into cache so it opens fully loaded and
     scrolls with no fetching. */
  function warmAssets(href, depth){
    fetch(href).then(r=>r.text()).then(html=>{
      const base=new URL(href, location.href);
      const doc=new DOMParser().parseFromString(html,'text/html');
      doc.querySelectorAll('img[src],source[src],video[poster]').forEach(el=>{
        const raw=el.getAttribute('src')||el.getAttribute('poster'); if(!raw) return;
        if(/^data:|^https?:\/\//i.test(raw)) return;                 // skip data/external
        const u=new URL(raw, base).href;
        if(/\.(mp4|webm)(\?|$)/i.test(u)){ const l=document.createElement('link'); l.rel='prefetch'; l.href=u; document.head.appendChild(l); }
        else { const im=new Image(); im.src=u; }
      });
      if(depth>0) doc.querySelectorAll('iframe[src]').forEach(f=>{
        const raw=f.getAttribute('src'); if(raw && !/^https?:\/\//i.test(raw)) warmAssets(new URL(raw, base).href, depth-1);
      });
    }).catch(()=>{});
  }
  let done=false;
  function warm(){
    if(done) return; done=true;
    PROJECTS.forEach(p=>{ if(p.cover){ const im=new Image(); im.src=p.cover; } }); // covers -> instant popup
    const wv=document.getElementById('wmpVideo'); if(wv){ wv.preload='auto'; try{ wv.load(); }catch(e){} } // WMP visuals -> opens smooth
    const wa=document.getElementById('wmpAudio'); if(wa){ wa.preload='auto'; try{ wa.load(); }catch(e){} } // WMP track -> fully buffered
    PROJECTS.forEach(p=>{                                                          // page shells -> instant open
      if(!p.embed) return;
      const l=document.createElement('link');
      l.rel='prefetch'; l.as='document'; l.href=p.embed;
      document.head.appendChild(l);
    });
    // Priority projects: fully pre-load Disco + Copia so they open ready and scroll without loading.
    if(fast) PROJECTS.forEach(p=>{ if((p.id==='disco'||p.id==='copia') && p.embed) warmAssets(p.embed,1); });
  }
  const wIcon=document.getElementById('wmp-icon'); if(wIcon) wIcon.addEventListener('pointerenter',warm,{once:true}); // warm early if they head for the player
  function schedule(){ ('requestIdleCallback' in window) ? requestIdleCallback(warm,{timeout:4000}) : setTimeout(warm,1800); }
  (document.readyState==='complete') ? schedule() : addEventListener('load',schedule);
})();

/* ================= WINDOWS MEDIA PLAYER ================= */
(function(){
  const icon=document.getElementById('wmp-icon'), win=document.getElementById('wmpwin');
  if(!icon||!win) return;
  const audio=document.getElementById('wmpAudio'), canvas=document.getElementById('wmpCanvas'), stage=document.getElementById('wmpStage');
  const video=document.getElementById('wmpVideo');
  const playBtn=document.getElementById('wmpPlay'), stopBtn=document.getElementById('wmpStop'), muteBtn=document.getElementById('wmpMute');
  const seek=document.getElementById('wmpSeek'), vol=document.getElementById('wmpVol');
  const timeEl=document.getElementById('wmpTime'), statusEl=document.getElementById('wmpStatus'), vizLabel=document.getElementById('wmpVizLabel');
  const PLAY_SVG='<svg viewBox="0 0 16 16"><path d="M3 2 L14 8 L3 14 Z" fill="currentColor"/></svg>';
  const PAUSE_SVG='<svg viewBox="0 0 16 16"><rect x="3.5" y="2.5" width="3.5" height="11" fill="currentColor"/><rect x="9" y="2.5" width="3.5" height="11" fill="currentColor"/></svg>';
  playBtn.innerHTML=PLAY_SVG;
  function fmt(t){ if(!isFinite(t)) return '00:00'; t=Math.max(0,t|0); const m=(t/60)|0,s=t%60; return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }
  function setPlayIcon(){ playBtn.innerHTML=audio.paused?PLAY_SVG:PAUSE_SVG; }

  /* ---- open / hide / drag (reuses bringFront + z from above) ---- */
  function openWin(){ win.classList.add('open'); bringFront(win); play(); applyMode(); }
  function hideWin(){ win.classList.remove('open'); stopViz(); video.pause(); }
  icon.addEventListener('click',openWin);
  document.getElementById('wmpClose').addEventListener('click',hideWin);
  document.getElementById('wmpMin').addEventListener('click',hideWin);
  win.addEventListener('pointerdown',()=>bringFront(win));
  (function(){ const bar=document.getElementById('wmpTitle');
    bar.addEventListener('pointerdown',e=>{
      if(e.target.closest('.wmp-wbtns')) return;
      bringFront(win); bar.classList.add('drag'); bar.setPointerCapture(e.pointerId);
      const r=win.getBoundingClientRect(); win.style.marginLeft='0'; win.style.left=r.left+'px'; win.style.top=r.top+'px';
      const ox=e.clientX-r.left, oy=e.clientY-r.top;
      function mv(ev){ win.style.left=(ev.clientX-ox)+'px'; win.style.top=Math.max(28,ev.clientY-oy)+'px'; }
      function up(){ bar.removeEventListener('pointermove',mv); bar.removeEventListener('pointerup',up); bar.classList.remove('drag'); }
      bar.addEventListener('pointermove',mv); bar.addEventListener('pointerup',up);
    });
  })();

  /* ---- audio + analyser ---- */
  let actx,srcNode,analyser,freq,wave,started=false;
  function initAudio(){
    if(started) return;
    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      srcNode=actx.createMediaElementSource(audio);
      analyser=actx.createAnalyser(); analyser.fftSize=512; analyser.smoothingTimeConstant=0.82;
      freq=new Uint8Array(analyser.frequencyBinCount); wave=new Uint8Array(analyser.fftSize);
      srcNode.connect(analyser); analyser.connect(actx.destination); started=true;
    }catch(e){ started=false; }
  }
  function play(){ initAudio(); if(actx&&actx.state==='suspended') actx.resume(); audio.play().catch(()=>{}); }
  playBtn.addEventListener('click',()=>{ audio.paused?play():audio.pause(); });
  stopBtn.addEventListener('click',()=>{ audio.pause(); audio.currentTime=0; });
  document.getElementById('wmpPrev').addEventListener('click',()=>{ audio.currentTime=0; });
  document.getElementById('wmpNext').addEventListener('click',()=>{ audio.currentTime=0; });
  muteBtn.addEventListener('click',()=>{ audio.muted=!audio.muted; muteBtn.style.opacity=audio.muted?'.5':'1'; });
  audio.volume=vol.value/100;
  vol.addEventListener('input',()=>{ audio.volume=vol.value/100; if(audio.muted&&vol.value>0){ audio.muted=false; muteBtn.style.opacity='1'; } });
  let seeking=false;
  seek.addEventListener('input',()=>{ seeking=true; });
  seek.addEventListener('change',()=>{ if(audio.duration) audio.currentTime=(seek.value/1000)*audio.duration; seeking=false; });
  audio.addEventListener('play',()=>{ setPlayIcon(); statusEl.textContent='Playing: 128 kbps'; if(modes[mode]==='video'){ if(win.classList.contains('open')) video.play().catch(()=>{}); } else startViz(); });
  audio.addEventListener('pause',()=>{ setPlayIcon(); statusEl.textContent='Paused'; if(modes[mode]==='video') video.pause(); });
  audio.addEventListener('loadedmetadata',()=>{ timeEl.textContent='00:00 / '+fmt(audio.duration); });
  audio.addEventListener('timeupdate',()=>{ timeEl.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration); if(!seeking&&audio.duration) seek.value=(audio.currentTime/audio.duration)*1000; });
  audio.addEventListener('error',()=>{ statusEl.textContent='No media file found'; });

  /* ---- visualizations ---- */
  const dpr=Math.min(window.devicePixelRatio||1,2), ctx=canvas.getContext('2d');
  function resize(){ const r=stage.getBoundingClientRect(); canvas.width=Math.max(2,(r.width*dpr)|0); canvas.height=Math.max(2,(r.height*dpr)|0); }
  const modes=['video','plasma','bars','wave'], modeNames={video:'Visuals',plasma:'Ambience: Energy',bars:'Bars and Waves',wave:'Oscilloscope'}; let mode=0;
  stage.addEventListener('click',e=>{ if(e.target.closest('input,button')) return; mode=(mode+1)%modes.length; applyMode(); });
  let raf=null,t=0;
  function startViz(){ if(raf) return; resize(); loop(); }
  function stopViz(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }
  function applyMode(){
    const m=modes[mode]; vizLabel.textContent=modeNames[m];
    if(m==='video'){ canvas.style.display='none'; stopViz(); video.style.display='block'; if(win.classList.contains('open')) video.play().catch(()=>{}); }
    else{ video.style.display='none'; video.pause(); canvas.style.display='block'; if(win.classList.contains('open')) startViz(); }
  }
  addEventListener('resize',()=>{ if(raf) resize(); });
  function avgLevel(){ if(!analyser) return 0.12; let s=0; for(let i=0;i<freq.length;i++) s+=freq[i]; return (s/freq.length)/255; }
  function loop(){ raf=requestAnimationFrame(loop); t++; const w=canvas.width,h=canvas.height; const m=modes[mode];
    if(analyser){ analyser.getByteFrequencyData(freq); analyser.getByteTimeDomainData(wave); }
    if(m==='bars') drawBars(w,h); else if(m==='wave') drawWave(w,h); else drawPlasma(w,h); }

  function drawPlasma(w,h){
    ctx.globalCompositeOperation='source-over'; ctx.fillStyle='rgba(0,6,1,0.30)'; ctx.fillRect(0,0,w,h);
    const lv=analyser?avgLevel():0.13, cx=w/2, cy=h/2, R=Math.min(w,h);
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,R*(0.16+lv*0.55));
    gr.addColorStop(0,'rgba(190,255,200,'+(0.45+lv*0.45)+')'); gr.addColorStop(0.42,'rgba(40,225,95,'+(0.22+lv*0.3)+')'); gr.addColorStop(1,'rgba(0,40,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
    ctx.globalCompositeOperation='lighter';
    const bolts=18;
    for(let i=0;i<bolts;i++){
      const bin=analyser?freq[(i*3)%freq.length]/255:0.3+0.2*Math.sin(t*0.05+i);
      const ang=(i/bolts)*Math.PI*2 + t*0.0022 + Math.sin(t*0.01+i)*0.04;
      const len=R*(0.16+lv*0.62+bin*0.5), steps=7; let x=cx,y=cy;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      for(let s=1;s<=steps;s++){ const rr=len*s/steps, jit=(len/steps)*0.55;
        x=cx+Math.cos(ang)*rr+(Math.random()-0.5)*jit; y=cy+Math.sin(ang)*rr+(Math.random()-0.5)*jit; ctx.lineTo(x,y); }
      ctx.strokeStyle='rgba(120,255,150,'+(0.16+bin*0.6)+')'; ctx.lineWidth=Math.max(1,dpr*(0.6+bin*1.7));
      ctx.shadowColor='rgba(60,255,110,0.9)'; ctx.shadowBlur=dpr*8; ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.globalCompositeOperation='source-over';
  }
  function drawBars(w,h){
    ctx.fillStyle='#001a06'; ctx.fillRect(0,0,w,h);
    const n=48, bw=w/n;
    for(let i=0;i<n;i++){ const v=analyser?freq[(i/n*freq.length)|0]/255:(0.18+0.14*Math.sin(t*0.06+i*0.4)); const bh=v*h*0.92;
      const g=ctx.createLinearGradient(0,h,0,h-bh); g.addColorStop(0,'#0a6'); g.addColorStop(0.6,'#3e8'); g.addColorStop(1,'#cffcd6');
      ctx.fillStyle=g; ctx.fillRect(i*bw+dpr,h-bh,bw-2*dpr,bh); }
    if(analyser){ ctx.beginPath(); for(let i=0;i<wave.length;i++){ const x=i/wave.length*w,y=h/2+(wave[i]-128)/128*h*0.22; i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.strokeStyle='rgba(180,255,200,0.55)'; ctx.lineWidth=dpr; ctx.stroke(); }
  }
  function drawWave(w,h){
    ctx.fillStyle='#00120a'; ctx.fillRect(0,0,w,h); ctx.beginPath();
    const N=analyser?wave.length:256;
    for(let i=0;i<N;i++){ const v=analyser?(wave[i]-128)/128:Math.sin(i*0.08+t*0.1)*0.3; const x=i/N*w,y=h/2+v*h*0.4; i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle='#5fffa0'; ctx.lineWidth=dpr*1.6; ctx.shadowColor='#3f9'; ctx.shadowBlur=dpr*6; ctx.stroke(); ctx.shadowBlur=0;
  }
})();

/* ================= MOBILE ICON GRID (reflow + UFO/player as cells) ================= */
(function(){
  const MQ=matchMedia('(max-width:640px)');
  const order=['marian','cbh','viking','freelance','shift','verve','unum','disco','copia','korbel','herradura','alani','dirtyshirley'];
  const wmp=document.getElementById('wmp-icon'), ufoEl=document.getElementById('ufo');

  function toMobile(){
    if(applied) return; applied=true;
    order.forEach(id=>{ const el=document.querySelector('.folder[data-id="'+id+'"]'); if(el) icons.appendChild(el); });
    if(wmp) icons.appendChild(wmp);
    if(ufoEl) icons.appendChild(ufoEl);
    document.body.classList.add('mgrid');
  }
  function toDesktop(){
    if(!applied) return; applied=false;
    document.body.classList.remove('mgrid');
    PROJECTS.forEach(p=>{ const el=document.querySelector('.folder[data-id="'+p.id+'"]'); if(el)(p.rightStack?iconsRight:(p.center?iconsCenter:icons)).appendChild(el); });
    if(wmp) document.body.appendChild(wmp);
    if(ufoEl) document.body.appendChild(ufoEl);
  }
  function apply(){ MQ.matches?toMobile():toDesktop(); }
  apply();
  if(MQ.addEventListener) MQ.addEventListener('change',apply); else if(MQ.addListener) MQ.addListener(apply);
})();

<script>
/* Boot fade-in: reveal the desktop only once icons are laid out and the pixel font is
   ready, so visitors never see the brief unsettled / font-swap flash on load. */
(function(){
  var done=false;
  function boot(){ if(done) return; done=true; document.body.classList.add('booted'); }
  function ready(){
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(function(){ requestAnimationFrame(boot); }); }
    else { requestAnimationFrame(boot); }
    setTimeout(boot, 1200);           // safety: never stay hidden if fonts hang
    addEventListener('load', boot);   // final fallback
  }
  if(document.readyState==='loading') addEventListener('DOMContentLoaded', ready); else ready();
})();
</script>

   Anchored to live positions, hidden <=640px. */
(function(){
  try{localStorage.removeItem('gb-annot-drawn');}catch(e){}
  const W=222,H=64,TAIL=18;
  let el=null;
  function svgStr(){
    return '<svg width="'+W+'" height="'+(H+TAIL)+'" viewBox="0 0 '+W+' '+(H+TAIL)+'" aria-hidden="true">'
      +'<g opacity="0.3" transform="translate(5,5)" fill="#000">'

      +'<g fill="#000"><rect x="8" y="0" width="206" height="64"/><rect x="0" y="8" width="222" height="48"/>'
      +'<rect x="97" y="62" width="28" height="10"/><rect x="103" y="72" width="16" height="8"/></g>'
      +'<g fill="#fff"><rect x="11" y="3" width="200" height="58"/><rect x="3" y="11" width="216" height="42"/>'
      +'<rect x="101" y="59" width="20" height="10"/><rect x="106" y="69" width="10" height="8"/></g>'
      +'<text x="111" y="31" text-anchor="middle" font-family="\'Press Start 2P\',monospace" font-size="13" fill="#000">START HERE</text>'
      +'<text x="111" y="49" text-anchor="middle" font-family="\'Press Start 2P\',monospace" font-size="8" fill="#555">PRODUCT DESIGN &#183; UI/UX</text>'
      +'</svg>';
  }
  function build(){
    el=document.createElement('div');
    el.id='gb-start';
    el.setAttribute('aria-hidden','true');
    el.style.cssText='position:fixed;z-index:25;pointer-events:none;opacity:0;transform:translateY(10px);transition:opacity .45s ease,transform .45s ease;';
    el.innerHTML='<div class="gb-bob">'+svgStr()+'</div>';
    const st=document.createElement('style');
    st.textContent='@keyframes gbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}'
      +'#gb-start .gb-bob{animation:gbBob 2.2s ease-in-out infinite}'
      +'@media (prefers-reduced-motion:reduce){#gb-start .gb-bob{animation:none}}';
    document.head.appendChild(st);
    document.body.appendChild(el);
  }
  function place(){
    if(!el)return;
    const c=document.querySelector('#icons-center');
    const r=c?c.getBoundingClientRect():null;
    if(innerWidth<=640||!r||r.width<2){el.style.display='none';return;}
    el.style.display='block';
    el.style.left=Math.round(r.left+r.width/2-W/2)+'px';
    el.style.top=Math.max(34,Math.round(r.top-H-TAIL-16))+'px';
  }
  let rT;
  addEventListener('resize',function(){clearTimeout(rT);rT=setTimeout(place,120);});
  function init(){
    build(); place();
    setTimeout(function(){place(); el.style.opacity=1; el.style.transform='translateY(0)';},1000);
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(place);
  }
  if(document.readyState==='complete')init(); else addEventListener('load',init);
})();
</script>

<script>
/* ============ LANYARD — pendulum swing + drag, opens from the name button ============ */
(function(){
  const overlay=document.getElementById('lanyard-overlay'); if(!overlay) return;
  const stage=document.getElementById('lanyard-stage'), arm=document.getElementById('lanyard-arm');
  const card=document.getElementById('lanyard-card'), closeBtn=document.getElementById('lanyard-close');
  const backdrop=document.getElementById('lanyard-backdrop');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let theta=0, omega=0, dy=0, dvel=0, dragging=false, raf=null, last=0, opened=false, pivotX=0, pivotY=0, lastT=0;
  const GOL=20, DAMP=1.0;                 // pendulum: gravity/length, damping
  function setPivot(){ const r=stage.getBoundingClientRect(); pivotX=r.left+r.width/2; pivotY=r.top-170; }
  function render(){
    arm.style.transform='translateX(-50%) translateY('+dy.toFixed(1)+'px) rotate('+theta.toFixed(4)+'rad)';
    const tilt=Math.max(-20,Math.min(20,-omega*9));
    card.style.transform='rotateY('+tilt.toFixed(1)+'deg)';
  }
  function loop(ts){
    if(!last) last=ts; let dt=(ts-last)/1000; last=ts; if(dt>0.05) dt=0.05;
    if(dy<-0.4||Math.abs(dvel)>2){ dvel += (0-dy)*90*dt; dvel -= dvel*7*dt; dy += dvel*dt; }
    else { dy=0; dvel=0; }
    if(!dragging){ const a=-GOL*Math.sin(theta)-DAMP*omega; omega+=a*dt; theta+=omega*dt; }
    render(); raf=requestAnimationFrame(loop);
  }
  function open(){
    if(opened) return; opened=true; setPivot();
    theta=0; omega= reduce?0:1.1; dy= reduce?0:-(window.innerHeight*0.55); dvel=0; last=0;
    overlay.classList.add('open'); overlay.setAttribute('aria-hidden','false');
    document.addEventListener('keydown', onKey);
    if(reduce){ render(); } else { cancelAnimationFrame(raf); raf=requestAnimationFrame(loop); }
  }
  function close(){ if(!opened) return; opened=false; overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true'); cancelAnimationFrame(raf); raf=null; document.removeEventListener('keydown', onKey); }
  function onKey(e){ if(e.key==='Escape') close(); }
  closeBtn.addEventListener('click', close);
  backdrop.addEventListener('pointerdown', close);
  // drag the card
  card.addEventListener('pointerdown', e=>{
    dragging=true; card.classList.add('grab'); try{card.setPointerCapture(e.pointerId);}catch(_){}
    setPivot(); lastT=performance.now(); e.preventDefault();
  });
  window.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const nx=e.clientX-pivotX, ny=Math.max(6,e.clientY-pivotY);
    const nt=-Math.atan2(nx,ny), now=performance.now(), ddt=Math.max(0.001,(now-lastT)/1000);
    omega=(nt-theta)/ddt; theta=nt; lastT=now;
  });
  window.addEventListener('pointerup', ()=>{ if(dragging){ dragging=false; card.classList.remove('grab'); } });
  addEventListener('resize', setPivot);
  window.__openLanyard=open;
})();
</script>
