<title>Garrison OS — Portfolio v0.2</title>
<!--
  GARRISON OS — desktop portfolio v0.2 "skinned"
  Changes from v0.1:
    - Photographic Bliss background (assets/bliss-desktop.jpg / bliss-mobile.jpg,
      Higgsfield-generated) with CSS gradient fallback.
    - Pixel-art SVG folders: one color per project + symbol hinting at content.
    - Pixel-art UFO with visible green alien in the dome (refs: "best ship style"
      + "ufo with alien visible"). Bob animation + blinking lights kept.
    - Pixel-art speech bubble (chunky black border, stepped corners, offset shadow).
    - "Press Start 2P" pixel font for labels/accents.
    - Mobile layout + touch (pointer-event) window dragging.
  Still placeholder: fisheye portrait (needs Garrison photo), case-study imagery.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --mac-face:#d9d9d9; --mac-line:#888; --mac-dark:#555;
    --mac-title1:#e8e8e8; --mac-title2:#bcbcbc;
    --ink:#141418; --accent:#2b5fb3; --px-black:#16161c;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Geneva","Tahoma",system-ui,sans-serif;
    overflow:hidden; color:var(--ink);
    user-select:none; -webkit-user-select:none;
  }
  .pxfont{font-family:"Press Start 2P","Geneva",monospace;}

  /* ---------- DESKTOP / BACKGROUND ---------- */
  #desktop{
    position:fixed; inset:0; overflow:hidden;
    /* gradient fallback if the photo hasn't loaded / is missing */
    background:
      radial-gradient(130% 70% at 50% 118%, #67b13c 0%, #57a233 40%, #3c7d20 58%, transparent 59%),
      linear-gradient(#2e6fd0 0%, #4f8fe0 40%, #9cc5f0 75%, #d2e8fc 100%);
  }
  #desktop .bg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:center bottom; display:block;
  }

  /* CRT overlay: scanlines + vignette */
  #crt{position:fixed;inset:0;pointer-events:none;z-index:90;
    background:
      repeating-linear-gradient(rgba(0,0,0,.07) 0 1px, transparent 1px 3px),
      radial-gradient(120% 120% at 50% 50%, transparent 62%, rgba(0,0,0,.30) 100%);
    mix-blend-mode:multiply;}

  /* ---------- TOP MENU BAR (Mac Platinum) ---------- */
  #menubar{
    position:fixed;top:0;left:0;right:0;height:26px;z-index:80;
    background:linear-gradient(var(--mac-title1),var(--mac-title2));
    border-bottom:2px solid var(--px-black);
    display:flex;align-items:center;gap:16px;padding:0 12px;
    font-size:12px;
  }
  #menubar .logo{font-family:"Press Start 2P",monospace;font-size:10px;letter-spacing:0;}
  #menubar .mi{opacity:.85;}
  #menubar .clock{margin-left:auto;font-variant-numeric:tabular-nums;}

  /* ---------- FOLDERS ---------- */
  #icons{position:absolute;top:52px;left:22px;display:grid;z-index:20;
    grid-template-columns:repeat(4,124px);gap:20px 12px;width:532px;}
  /* newest projects — center stage */
  #icons-center{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);z-index:20;
    display:flex;gap:34px;}
  /* right-side vertical stack */
  #icons-right{position:absolute;top:50%;right:30px;transform:translateY(-50%);z-index:20;
    display:flex;flex-direction:column;align-items:center;gap:16px;}
  .folder{width:124px;text-align:center;cursor:pointer;color:#fff;}
  .folder svg{width:94px;height:auto;display:block;margin:0 auto 5px;
    filter:drop-shadow(0 3px 0 rgba(0,0,0,.25));}
  .folder .lbl{font-family:"Press Start 2P",monospace;font-size:8px;line-height:1.5;
    padding:2px 3px;border-radius:2px;
    text-shadow:1px 1px 0 var(--px-black),-1px 1px 0 var(--px-black),1px -1px 0 var(--px-black),-1px -1px 0 var(--px-black);}
  .folder:hover .lbl{background:var(--accent);text-shadow:none;}
  .folder:hover svg{transform:translateY(-2px);}
  .folder:active svg{filter:drop-shadow(0 1px 0 rgba(0,0,0,.25)) brightness(.92);transform:translateY(1px);}

  /* ---------- WINDOWS (Mac Platinum chrome) ---------- */
  .win{position:absolute;background:var(--mac-face);border:2px solid var(--px-black);
    border-radius:6px 6px 3px 3px;box-shadow:4px 6px 0 rgba(0,0,0,.30);
    display:none;flex-direction:column;z-index:40;min-width:260px;}
  .win.open{display:flex;}
  .titlebar{height:24px;display:flex;align-items:center;gap:8px;padding:0 8px;
    border-bottom:2px solid var(--px-black);border-radius:4px 4px 0 0;cursor:grab;touch-action:none;
    background:repeating-linear-gradient(180deg,#f2f2f2 0 1px,#c8c8c8 1px 2px);}
  .titlebar.drag{cursor:grabbing;}
  .closebox{width:15px;height:15px;border:2px solid var(--px-black);background:#cfcfcf;cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;}
  .closebox::after{content:"\2715";font-size:9px;font-weight:bold;line-height:1;color:var(--px-black);}
  .closebox:hover{background:#9fb6e0;}
  .title{font-family:"Press Start 2P",monospace;font-size:8px;flex:1;text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .winbody{padding:14px;overflow:auto;background:#fff;border-radius:0 0 2px 2px;}

  /* preview window */
  .preview{width:300px;}
  .preview .cover{height:130px;border:2px solid var(--px-black);overflow:hidden;
    background:linear-gradient(135deg,#cfe0f5,#e9d8b6);
    display:flex;align-items:center;justify-content:center;color:#5a5a5a;font-size:12px;}
  .preview .cover img{width:100%;height:100%;object-fit:cover;display:block;image-rendering:auto;}
  .preview .one{font-size:13px;margin:10px 0 12px;line-height:1.45;}
  /* large preview (copia flagship) — ~2x, wide 3-up cover shown uncropped on cream */
  .preview.large{width:min(600px,92vw);}
  .preview.large .cover{height:200px;background:#FAF6EE;}
  .preview.large .cover img{object-fit:contain;}
  .preview.large .one{font-size:16px;margin:14px 0 10px;line-height:1.5;}
  .preview .link{display:inline-block;font-size:14px;margin:0 0 12px;font-weight:bold;
    color:#1C664D;text-decoration:none;word-break:break-word;}
  .preview .link:hover{color:#1E3D30;text-decoration:underline;}
  .preview .note{font-size:12px;color:#777;line-height:1.55;margin:0 0 14px;}
  .btn{font-family:"Press Start 2P",monospace;font-size:8px;padding:7px 12px;cursor:pointer;
    background:linear-gradient(#fff,#dcdcdc);border:2px solid var(--px-black);
    box-shadow:2px 2px 0 var(--px-black);}
  .btn:active{box-shadow:0 0 0 var(--px-black);transform:translate(2px,2px);}

  /* case study window */
  .case{width:min(640px,86vw);max-height:78vh;}
  .case .winbody h2{margin:.1em 0 .15em;font-family:"Press Start 2P",monospace;font-size:15px;}
  .case .winbody .meta{color:#666;font-size:12px;margin-bottom:12px;}
  .case .hero{height:170px;margin:0 0 14px;border:2px solid var(--px-black);
    background:linear-gradient(135deg,#cfe0f5,#e9d8b6);
    display:flex;align-items:center;justify-content:center;color:#5a5a5a;font-size:12px;}
  .case .winbody h3{font-family:"Press Start 2P",monospace;font-size:9px;
    color:var(--accent);margin:18px 0 5px;}
  .case .winbody p{font-size:14px;line-height:1.55;margin:0 0 6px;}

  /* ---------- EMBEDDED CASE (finished page, near full-screen) ---------- */
  /* Title bar + a full-bleed iframe; the case study scrolls inside the iframe. */
  .case.embed{width:min(1800px,98vw);height:94vh;max-height:94vh;max-width:1800px;
    overflow:hidden;}
  .case.embed .embedframe{flex:1;min-height:0;width:100%;border:0;display:block;
    background:#fff;border-radius:0 0 2px 2px;}

  /* ---------- BOTTOM-LEFT: GARRISON (fisheye) STANDING ON THE PLANET CURVE ---------- */
  /* z-index sits in the background layer with the UFO: above wallpaper, below the
     desktop icons (z20) and every window (z40+), so windows always cover it. */
  #garrison{position:fixed;left:4vw;bottom:9.5vh;z-index:5;height:38vh;width:auto;
    pointer-events:none;user-select:none;-webkit-user-drag:none;
    transform:rotate(-20deg);transform-origin:50% 96%;
    filter:drop-shadow(0 6px 8px rgba(10,30,5,.35));}
  #garrison-shadow{position:fixed;left:calc(4vw + 4vh);bottom:8.6vh;z-index:4;
    width:18vh;height:3.4vh;border-radius:50%;pointer-events:none;
    background:radial-gradient(closest-side, rgba(10,30,5,.42), rgba(10,30,5,0) 70%);}

  /* ---------- UFO (pixel art) ---------- */
  /* z-index sits in the background layer: above wallpaper, below the desktop
     icons (z20) and every window (z40+), so windows always cover it. */
  #ufo{position:fixed;top:84px;right:13%;z-index:5;cursor:pointer;
    animation:bob 3.4s ease-in-out infinite;}
  #ufo svg{width:108px;height:auto;display:block;
    filter:drop-shadow(0 6px 0 rgba(0,0,0,.18));}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-14px) rotate(1deg);}}
  #ufo .lite{animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:.25;}50%{opacity:1;}}

  /* ---------- PIXEL SPEECH BUBBLE ---------- */
  #bubble{position:fixed;z-index:75;display:none;max-width:230px;
    font-family:"Press Start 2P",monospace;font-size:9px;line-height:1.7;color:var(--ink);
    background:#fff;padding:12px 14px;
    border:3px solid var(--px-black);
    box-shadow:6px 6px 0 rgba(22,22,28,.45);
    clip-path:polygon(0 9px,3px 9px,3px 6px,6px 6px,6px 3px,9px 3px,9px 0,
      calc(100% - 9px) 0,calc(100% - 9px) 3px,calc(100% - 6px) 3px,calc(100% - 6px) 6px,
      calc(100% - 3px) 6px,calc(100% - 3px) 9px,100% 9px,
      100% calc(100% - 9px),calc(100% - 3px) calc(100% - 9px),calc(100% - 3px) calc(100% - 6px),
      calc(100% - 6px) calc(100% - 6px),calc(100% - 6px) calc(100% - 3px),calc(100% - 9px) calc(100% - 3px),
      calc(100% - 9px) 100%,9px 100%,9px calc(100% - 3px),6px calc(100% - 3px),
      6px calc(100% - 6px),3px calc(100% - 6px),3px calc(100% - 9px),0 calc(100% - 9px));}
  #tail{position:fixed;z-index:74;display:none;width:24px;height:18px;}
  #tail i{position:absolute;background:#fff;border-left:3px solid var(--px-black);border-right:3px solid var(--px-black);}
  #tail i:nth-child(1){left:0;top:0;width:18px;height:9px;}
  #tail i:nth-child(2){left:6px;top:9px;width:12px;height:6px;border-bottom:3px solid var(--px-black);}

  .hint{position:fixed;bottom:6px;right:10px;z-index:80;font-size:10px;color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.6);opacity:.8;}

  /* ---------- MOBILE ---------- */
  @media (max-width:640px){
    #icons{top:44px;left:12px;right:12px;width:auto;
      grid-template-columns:repeat(3,1fr);gap:16px 6px;}
    #icons-center{top:47vh;left:42%;gap:18px;}
    /* drop the right-side stack below the full-width grid so it never overlaps on phones */
    #icons-right{right:6px;gap:10px;top:43vh;transform:none;}
    .folder{width:auto;}
    .folder svg{width:75px;}
    .folder .lbl{font-size:7px;}
    #menubar{gap:10px;height:24px;}
    #menubar .mi{display:none;}
    #ufo{top:62vh;bottom:auto;right:auto;left:50%;margin-left:-42px;}
    #ufo svg{width:84px;}
    #garrison{left:5vw;bottom:6vh;height:24vh;}
    #garrison-shadow{left:calc(5vw + 2.5vh);bottom:5.5vh;width:12vh;height:2.2vh;}
    .preview{width:min(300px,88vw);}
    .case{width:94vw;max-height:80vh;}
    .case .hero{height:120px;}
    .case.embed{width:98vw;height:94vh;max-height:94vh;}
    .hint{display:none;}
  }
</style>
  <link rel="stylesheet" href="assets/cursors/cursors.css">
<style id="wmp-css">
  /* ===== Windows Media Player (retro WMP9 homage) ===== */
  #wmp-icon{position:fixed; left:calc(18.5vw - 48px); bottom:calc(49vh - 48px); z-index:6; width:96px; text-align:center;
    cursor:pointer; animation:bob 3.4s ease-in-out infinite; user-select:none; -webkit-user-select:none;}
  #wmp-icon img{width:72px; height:auto; display:block; margin:0 auto 5px; filter:drop-shadow(0 3px 0 rgba(0,0,0,.28));}
  #wmp-icon .lbl{font-family:"Press Start 2P",monospace; font-size:8px; line-height:1.6; color:#fff; padding:2px 3px; border-radius:2px;
    text-shadow:1px 1px 0 var(--px-black),-1px 1px 0 var(--px-black),1px -1px 0 var(--px-black),-1px -1px 0 var(--px-black);}
  #wmp-icon:hover .lbl{background:var(--accent); text-shadow:none;}
  #wmp-icon:hover img{transform:translateY(-2px);}
  #wmp-icon:active img{filter:drop-shadow(0 1px 0 rgba(0,0,0,.28)) brightness(.93); transform:translateY(1px);}
  @media(max-width:640px){ #wmp-icon{ right:auto; left:50%; margin-left:-48px; bottom:11vh; } }

  #wmpwin{position:fixed; display:none; width:430px; max-width:94vw; left:50%; top:64px; margin-left:-215px; z-index:60;
    background:#ece9d8; border:1px solid #0a246a; border-radius:8px 8px 3px 3px; box-shadow:0 18px 50px rgba(0,0,0,.5);
    font-family:Tahoma,"Geneva",system-ui,sans-serif; overflow:hidden;}
  #wmpwin.open{display:block;}
  .wmp-title{height:30px; display:flex; align-items:center; gap:7px; padding:0 5px 0 8px; cursor:grab; touch-action:none;
    background:linear-gradient(180deg,#3a8bf0 0%,#2c72e0 9%,#1f5fd6 48%,#1a55c8 90%,#1647ad 100%); color:#fff; border-radius:7px 7px 0 0;}
  .wmp-title.drag{cursor:grabbing;}
  .wmp-tico{width:18px;height:18px;display:block;flex:none;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4));}
  .wmp-tname{font-weight:700;font-size:12px;text-shadow:1px 1px 2px rgba(0,0,0,.45);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wmp-wbtns{display:flex;gap:3px;}
  .wmp-wb{width:21px;height:19px;border:1px solid rgba(255,255,255,.5);border-radius:3px;color:#fff;font:700 10px/1 Tahoma;
    display:flex;align-items:center;justify-content:center;cursor:pointer;background:linear-gradient(180deg,#5b9bf5,#2b6fd6);}
  .wmp-wb:hover{filter:brightness(1.13);}
  .wmp-wb.close{background:linear-gradient(180deg,#e9806f,#d23b22);}
  .wmp-menu{display:flex;gap:14px;padding:3px 10px;background:#f5f4ec;border-bottom:1px solid #c8c4b4;font-size:11px;color:#1a1a1a;}
  .wmp-menu span:hover{background:#2b5fb3;color:#fff;}
  .wmp-stage{position:relative;background:#000;height:262px;overflow:hidden;}
  .wmp-stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .wmp-stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;background:#000;}
  .wmp-vizlabel{position:absolute;left:9px;bottom:7px;font:600 9px/1 "JetBrains Mono",monospace;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);pointer-events:none;}
  .wmp-stage .hint{position:absolute;right:9px;bottom:7px;font:600 9px/1 "JetBrains Mono",monospace;color:rgba(255,255,255,.34);pointer-events:none;}
  .wmp-status{display:flex;justify-content:space-between;align-items:center;padding:3px 11px;background:linear-gradient(#3b3b3b,#222);color:#cfe9d2;font-size:10.5px;border-top:1px solid #000;}
  .wmp-status .wmp-time{font-family:"JetBrains Mono",monospace;color:#9fe6ad;}
  .wmp-bar{padding:9px 12px 12px;background:linear-gradient(180deg,#fbfbf7,#d7d6cc 60%,#c3c2b5);border-top:1px solid #fff;}
  .wmp-seek{margin:0 0 9px;}
  .wmp-seek input,.wmp-vol{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:#9aa6b4;outline:none;cursor:pointer;}
  .wmp-seek input{width:100%;display:block;}
  .wmp-seek input::-webkit-slider-thumb,.wmp-vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#cfe6ff,#2b6fd6);border:1px solid #14457f;cursor:pointer;}
  .wmp-seek input::-moz-range-thumb,.wmp-vol::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#2b6fd6;border:1px solid #14457f;cursor:pointer;}
  .wmp-ctrls{display:flex;align-items:center;gap:8px;}
  .wmp-btn{border:1px solid #8a93a0;border-radius:50%;background:linear-gradient(180deg,#fdfdfd,#c4cdd8);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#1f4e9b;padding:0;}
  .wmp-btn:hover{filter:brightness(1.05);} .wmp-btn:active{transform:translateY(1px);}
  .wmp-play{width:38px;height:38px;} .wmp-play svg{width:16px;height:16px;}
  .wmp-stop,.wmp-prev,.wmp-next,.wmp-mute{width:26px;height:26px;}
  .wmp-stop svg,.wmp-prev svg,.wmp-next svg,.wmp-mute svg{width:13px;height:13px;}
  .wmp-vol{width:72px;margin-left:2px;}
  .wmp-track{margin-left:auto;font-size:10px;color:#33405a;font-style:italic;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @media(max-width:640px){ #wmpwin{top:52px;} .wmp-stage{height:200px;} .wmp-track{display:none;} }
</style>
</head>
<body>
<div id="desktop">
  <img class="bg" id="bgimg" alt="" aria-hidden="true">
  <div id="icons"></div>
  <div id="icons-center"></div>
  <div id="icons-right"></div>
</div>

<!-- menu bar -->
<div id="menubar">
  <span class="logo">&#9673; GARRISON OS</span>
  <span class="mi">File</span><span class="mi">Edit</span><span class="mi">View</span><span class="mi">Special</span>
  <span class="clock" id="clock"></span>
</div>

<!-- bottom-left: Garrison (fisheye) standing on the planet curve (album-cover style) -->
<div id="garrison-shadow"></div>
<img id="garrison" src="assets/garrison-standing.png" alt="Garrison Bullock standing on a tiny grass planet, throwing a peace sign" draggable="false">

<!-- UFO + pixel speech bubble -->
<div id="ufo" title="click me"></div>
<div id="bubble">gleep zip zlorp</div>
<div id="tail"><i></i><i></i></div>

<!-- Windows Media Player -->
<div id="wmp-icon" title="Windows Media Player">
  <img src="assets/wmp-icon.png" alt="Windows Media Player">
  <div class="lbl">Windows Media<br>Player</div>
</div>
<div id="wmpwin" role="dialog" aria-label="Windows Media Player">
  <div class="wmp-title" id="wmpTitle">
    <img class="wmp-tico" src="assets/wmp-icon.png" alt="">
    <span class="wmp-tname">Windows Media Player</span>
    <span class="wmp-wbtns">
      <button class="wmp-wb min" id="wmpMin" title="Minimize">&#95;</button>
      <button class="wmp-wb max" title="Maximize">&#9633;</button>
      <button class="wmp-wb close" id="wmpClose" title="Close">&#10005;</button>
    </span>
  </div>
  <div class="wmp-menu"><span>File</span><span>View</span><span>Play</span><span>Tools</span><span>Help</span></div>
  <div class="wmp-stage" id="wmpStage">
    <video id="wmpVideo" class="wmp-video" muted loop playsinline preload="none" poster="assets/media/visuals-poster.jpg"><source src="assets/media/visuals.mp4" type="video/mp4"></video>
    <canvas id="wmpCanvas"></canvas>
    <div class="wmp-vizlabel" id="wmpVizLabel">Ambience: Energy</div>
    <div class="hint">click to change visualization</div>
  </div>
  <div class="wmp-status"><span id="wmpStatus">Ready</span><span class="wmp-time" id="wmpTime">00:00 / 00:00</span></div>
  <div class="wmp-bar">
    <div class="wmp-seek"><input type="range" id="wmpSeek" min="0" max="1000" value="0" aria-label="Seek"></div>
    <div class="wmp-ctrls">
      <button class="wmp-btn wmp-play" id="wmpPlay" title="Play / Pause"></button>
      <button class="wmp-btn wmp-stop" id="wmpStop" title="Stop"><svg viewBox="0 0 16 16"><rect x="3.5" y="3.5" width="9" height="9" fill="currentColor"/></svg></button>

/* Render a grid of single-character "pixels" into SVG rects. */
function pixelSVG(rows,palette,opts={}){
  const cell=opts.cell||1;
  const w=rows[0].length*cell, h=rows.length*cell;
  let liteIdx=0, out='';
  rows.forEach((row,y)=>{
    for(let x=0;x<row.length;x++){
      const ch=row[x];
      if(ch==='.'||!palette[ch]) continue;
      const cls=(ch==='Y')?` class="lite" style="animation-delay:${(liteIdx++%5)*0.28}s"`:'';
      out+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="${palette[ch]}"${cls}/>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${out}</svg>`;
}

/* Pixel folder — classic open-folder shape per reference.
   FOLDER_FILL defines only the colored shape (D = dark back flap + tab, F = front panel).
   The 1px black outline is generated automatically around every exposed edge
   (4-neighborhood), which wraps the whole silhouette and yields stepped corners,
   plus a black dividing line wherever the back flap meets the front panel. */
const FOLDER_FILL=[
"..............DDDDDDD.",
".............DDDDDDDD.",
"............DDDDDDDDD.",
".DDDDDDDDDDDDDDDDDDDD.",
".DDDDDDDDDDDDDDDDDDDD.",
".FFFFFFFDDDDDDDDDDDDD.",
".FFFFFFFFDDDDDDDDDDDD.",
".FFFFFFFFFDDDDDDDDDDD.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF.",
".FFFFFFFFFFFFFFFFFFFF."
];
function folderSVG(fill,dark,symbol){
  const rows=FOLDER_FILL, H=rows.length, W=rows[0].length;
  const get=(x,y)=>(y<0||y>=H||x<0||x>=W)?'.':rows[y][x];
  const isFill=c=>c==='D'||c==='F';
  let s=`<svg viewBox="0 0 ${W+2} ${H+2}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">`;
  for(let y=-1;y<=H;y++)for(let x=-1;x<=W;x++){
    const c=get(x,y); let col=null;
    if(c==='.'){
      if(isFill(get(x+1,y))||isFill(get(x-1,y))||isFill(get(x,y+1))||isFill(get(x,y-1))) col='#16161c';
    }else if(c==='D'){
      col=(get(x+1,y)==='F'||get(x-1,y)==='F'||get(x,y+1)==='F'||get(x,y-1)==='F')?'#16161c':dark;
    }else col=fill;
    if(col) s+=`<rect x="${x+1}" y="${y+1}" width="1" height="1" fill="${col}"/>`;
  }
  const px=SYMBOLS[symbol]||[];
  /* symbol pixels: X/W white, plus accent colors for multicolor glyphs */
  const SYMC={X:'#fff',W:'#fff',C:'#aee2ff',L:'#c9a6f0',Y:'#ffd34d',K:'#16161c',G:'#56c172',v:'#16161c',R:'#bd4a3c'};
  /* center the symbol's inked bounding box on the front panel (rendered cols 2-21, rows 9-19) */
  let x0=99,x1=-1,y0=99,y1=-1;
  px.forEach((row,y)=>{for(let x=0;x<row.length;x++){if(SYMC[row[x]]){
    if(x<x0)x0=x; if(x>x1)x1=x; if(y<y0)y0=y; if(y>y1)y1=y;}}});
  const gwu=x1-x0+1, ghu=y1-y0+1;
  const cell=Math.min(1.2, 9.2/ghu, 18/gwu);
  const ox=12-(gwu*cell)/2-x0*cell;
  const oy=14.4-(ghu*cell)/2-y0*cell;
  px.forEach((row,y)=>{for(let x=0;x<row.length;x++){if(SYMC[row[x]])
    s+=`<rect x="${(ox+x*cell).toFixed(2)}" y="${(oy+y*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}" fill="${SYMC[row[x]]}"/>`;}});
  return s+'</svg>';
}

let z=40;
function makeWin(cls){

function bringFront(w){ w.style.zIndex=(++z); }
function placeNear(w,x,y){
  const vw=innerWidth,vh=innerHeight,r=w.getBoundingClientRect();

}

/* close + drag (pointer events: mouse + touch) */
function wireWindow(w){
  w.querySelector('.closebox').addEventListener('click',()=>w.classList.remove('open'));
  const bar=w.querySelector('.titlebar');
  bar.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('closebox')) return;
    bringFront(w); bar.classList.add('drag');
    bar.setPointerCapture(e.pointerId);
    const r=w.getBoundingClientRect(), ox=e.clientX-r.left, oy=e.clientY-r.top;
    function mv(ev){ w.style.left=(ev.clientX-ox)+'px'; w.style.top=Math.max(28,ev.clientY-oy)+'px'; }
    function up(){ bar.removeEventListener('pointermove',mv); bar.removeEventListener('pointerup',up); bar.classList.remove('drag'); }
    bar.addEventListener('pointermove',mv); bar.addEventListener('pointerup',up);
  });
  w.addEventListener('pointerdown',()=>bringFront(w));
}

    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      srcNode=actx.createMediaElementSource(audio);
      analyser=actx.createAnalyser(); analyser.fftSize=512; analyser.smoothingTimeConstant=0.82;
      freq=new Uint8Array(analyser.frequencyBinCount); wave=new Uint8Array(analyser.fftSize);
      srcNode.connect(analyser); analyser.connect(actx.destination); started=true;
    }catch(e){ started=false; }
  }
  function play(){ initAudio(); if(actx&&actx.state==='suspended') actx.resume(); audio.play().catch(()=>{}); }
  playBtn.addEventListener('click',()=>{ audio.paused?play():audio.pause(); });
  stopBtn.addEventListener('click',()=>{ audio.pause(); audio.currentTime=0; });
  document.getElementById('wmpPrev').addEventListener('click',()=>{ audio.currentTime=0; });
  document.getElementById('wmpNext').addEventListener('click',()=>{ audio.currentTime=0; });
  muteBtn.addEventListener('click',()=>{ audio.muted=!audio.muted; muteBtn.style.opacity=audio.muted?'.5':'1'; });
  audio.volume=vol.value/100;
  vol.addEventListener('input',()=>{ audio.volume=vol.value/100; if(audio.muted&&vol.value>0){ audio.muted=false; muteBtn.style.opacity='1'; } });
  let seeking=false;
  seek.addEventListener('input',()=>{ seeking=true; });
  seek.addEventListener('change',()=>{ if(audio.duration) audio.currentTime=(seek.value/1000)*audio.duration; seeking=false; });
  audio.addEventListener('play',()=>{ setPlayIcon(); statusEl.textContent='Playing: 128 kbps'; if(modes[mode]==='video'){ if(win.classList.contains('open')) video.play().catch(()=>{}); } else startViz(); });
  audio.addEventListener('pause',()=>{ setPlayIcon(); statusEl.textContent='Paused'; if(modes[mode]==='video') video.pause(); });
  audio.addEventListener('loadedmetadata',()=>{ timeEl.textContent='00:00 / '+fmt(audio.duration); });
  audio.addEventListener('timeupdate',()=>{ timeEl.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration); if(!seeking&&audio.duration) seek.value=(audio.currentTime/audio.duration)*1000; });
  audio.addEventListener('error',()=>{ statusEl.textContent='No media file found'; });

  /* ---- visualizations ---- */
  const dpr=Math.min(window.devicePixelRatio||1,2), ctx=canvas.getContext('2d');
  function resize(){ const r=stage.getBoundingClientRect(); canvas.width=Math.max(2,(r.width*dpr)|0); canvas.height=Math.max(2,(r.height*dpr)|0); }
  const modes=['video','plasma','bars','wave'], modeNames={video:'Visuals',plasma:'Ambience: Energy',bars:'Bars and Waves',wave:'Oscilloscope'}; let mode=0;
  stage.addEventListener('click',e=>{ if(e.target.closest('input,button')) return; mode=(mode+1)%modes.length; applyMode(); });
  let raf=null,t=0;
  function startViz(){ if(raf) return; resize(); loop(); }
  function stopViz(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }
  function applyMode(){
    const m=modes[mode]; vizLabel.textContent=modeNames[m];
    if(m==='video'){ canvas.style.display='none'; stopViz(); video.style.display='block'; if(win.classList.contains('open')) video.play().catch(()=>{}); }
    else{ video.style.display='none'; video.pause(); canvas.style.display='block'; if(win.classList.contains('open')) startViz(); }
  }
  addEventListener('resize',()=>{ if(raf) resize(); });
  function avgLevel(){ if(!analyser) return 0.12; let s=0; for(let i=0;i<freq.length;i++) s+=freq[i]; return (s/freq.length)/255; }
  function loop(){ raf=requestAnimationFrame(loop); t++; const w=canvas.width,h=canvas.height; const m=modes[mode];
    if(analyser){ analyser.getByteFrequencyData(freq); analyser.getByteTimeDomainData(wave); }
    if(m==='bars') drawBars(w,h); else if(m==='wave') drawWave(w,h); else drawPlasma(w,h); }

  function drawPlasma(w,h){
    ctx.globalCompositeOperation='source-over'; ctx.fillStyle='rgba(0,6,1,0.30)'; ctx.fillRect(0,0,w,h);
    const lv=analyser?avgLevel():0.13, cx=w/2, cy=h/2, R=Math.min(w,h);
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,R*(0.16+lv*0.55));
    gr.addColorStop(0,'rgba(190,255,200,'+(0.45+lv*0.45)+')'); gr.addColorStop(0.42,'rgba(40,225,95,'+(0.22+lv*0.3)+')'); gr.addColorStop(1,'rgba(0,40,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
    ctx.globalCompositeOperation='lighter';
    const bolts=18;
    for(let i=0;i<bolts;i++){
      const bin=analyser?freq[(i*3)%freq.length]/255:0.3+0.2*Math.sin(t*0.05+i);
      const ang=(i/bolts)*Math.PI*2 + t*0.0022 + Math.sin(t*0.01+i)*0.04;
      const len=R*(0.16+lv*0.62+bin*0.5), steps=7; let x=cx,y=cy;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      for(let s=1;s<=steps;s++){ const rr=len*s/steps, jit=(len/steps)*0.55;
        x=cx+Math.cos(ang)*rr+(Math.random()-0.5)*jit; y=cy+Math.sin(ang)*rr+(Math.random()-0.5)*jit; ctx.lineTo(x,y); }
      ctx.strokeStyle='rgba(120,255,150,'+(0.16+bin*0.6)+')'; ctx.lineWidth=Math.max(1,dpr*(0.6+bin*1.7));
      ctx.shadowColor='rgba(60,255,110,0.9)'; ctx.shadowBlur=dpr*8; ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.globalCompositeOperation='source-over';
  }
  function drawBars(w,h){
    ctx.fillStyle='#001a06'; ctx.fillRect(0,0,w,h);
    const n=48, bw=w/n;
    for(let i=0;i<n;i++){ const v=analyser?freq[(i/n*freq.length)|0]/255:(0.18+0.14*Math.sin(t*0.06+i*0.4)); const bh=v*h*0.92;
      const g=ctx.createLinearGradient(0,h,0,h-bh); g.addColorStop(0,'#0a6'); g.addColorStop(0.6,'#3e8'); g.addColorStop(1,'#cffcd6');
      ctx.fillStyle=g; ctx.fillRect(i*bw+dpr,h-bh,bw-2*dpr,bh); }
    if(analyser){ ctx.beginPath(); for(let i=0;i<wave.length;i++){ const x=i/wave.length*w,y=h/2+(wave[i]-128)/128*h*0.22; i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.strokeStyle='rgba(180,255,200,0.55)'; ctx.lineWidth=dpr; ctx.stroke(); }
  }
  function drawWave(w,h){
    ctx.fillStyle='#00120a'; ctx.fillRect(0,0,w,h); ctx.beginPath();
    const N=analyser?wave.length:256;
    for(let i=0;i<N;i++){ const v=analyser?(wave[i]-128)/128:Math.sin(i*0.08+t*0.1)*0.3; const x=i/N*w,y=h/2+v*h*0.4; i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle='#5fffa0'; ctx.lineWidth=dpr*1.6; ctx.shadowColor='#3f9'; ctx.shadowBlur=dpr*6; ctx.stroke(); ctx.shadowBlur=0;
  }
})();
</script>
</body>
